baseURL = 'https://machitwo.github.io/vectora/'
languageCode = 'en'
defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = true
title = 'Vectora'
enableEmoji = true
disableKinds = ['sitemap']

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[languages]
  [languages.en]
    languageName = 'English'
    languageCode = 'en'
    weight = 1
    title = 'Vectora'
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = 'GitHub'
        url = 'https://github.com/Kaffyn/Vectora'
        weight = 1
        [languages.en.menu.main.params]
          icon = 'github'
      [[languages.en.menu.main]]
        name = 'Theme'
        weight = 2
        [languages.en.menu.main.params]
          type = 'theme-toggle'
      [[languages.en.menu.main]]
        name = 'Search'
        weight = 3
        [languages.en.menu.main.params]
          type = 'search'

  [languages.pt-br]
    languageName = 'Portuguese'
    languageCode = 'pt-br'
    weight = 2
    [languages.pt-br.menu]
      [[languages.pt-br.menu.main]]
        name = 'GitHub'
        url = 'https://github.com/Kaffyn/Vectora'
        weight = 1
        [languages.pt-br.menu.main.params]
          icon = 'github'
      [[languages.pt-br.menu.main]]
        name = 'Theme'
        weight = 2
        [languages.pt-br.menu.main.params]
          type = 'theme-toggle'
      [[languages.pt-br.menu.main]]
        name = 'Search'
        weight = 3
        [languages.pt-br.menu.main.params]
          type = 'search'

[module]
  [[module.imports]]
    path = 'github.com/imfing/hextra'

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[params]
  [params.navbar]
    displayTitle = true
    displayLogo = true
    [params.navbar.logo]
      path = 'images/logo.jpg'
      link = '/'

  [params.page]
    [params.page.contextMenu]
      enable = true
      display = true
      links = [
        { name = 'Share on X', icon = 'x-twitter', url = 'https://x.com/intent/tweet?url={url}&text={title}' },
        { name = 'Share on LinkedIn', icon = 'linkedin', url = 'https://www.linkedin.com/sharing/share-offsite/?url={url}' }
      ]

  [params.footer]
    displayCopyright = true
    displayPoweredBy = true

  [params.theme]
    default = 'light'

  favicon = 'favicon.ico'

  [params.author]
    name = 'Vectora Contributors'
    github = 'Kaffyn/Vectora'

  description = 'Vectora official documentation. Vectora is an AI sub-agent in Go with support for integrations, context governance, and distributed deployment.'

  [params.opengraph]
    image = '/images/logo.jpg'
    locale = 'en_US'

  [params.seo]
    keywords = 'Vectora, Go, Vector Search, RAG, Context Engine, MCP, AI, Sub-Agent, Code Search'
    robots = 'index, follow'
