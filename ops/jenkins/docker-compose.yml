services:
  jenkins:
    build:
      context: ../..
      dockerfile: ops/jenkins/Dockerfile
    container_name: vectora-jenkins
    restart: unless-stopped
    user: root
    environment:
      JENKINS_OPTS: --prefix=/jenkins
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    ports:
      - "127.0.0.1:8081:8080"
      - "127.0.0.1:50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vectora-prod

volumes:
  jenkins_home:

networks:
  vectora-prod:
    name: vectora-prod
    driver: bridge
